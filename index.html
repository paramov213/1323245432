<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Telegram Web Clone (Premium)</title>
    <style>
        :root {
            --tg-blue: #2481cc;
            --tg-bg: #ffffff;
            --tg-gray: #f4f4f5;
            --premium-gradient: linear-gradient(45deg, #6b4cff, #ff4c9f);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* Auth Styles */
        #auth-container { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .premium-star { color: #8833ff; margin-left: 5px; }

        /* App Styles */
        #app { display: none; width: 100%; height: 100%; }
        .sidebar { width: 30%; border-right: 1px solid #ddd; overflow-y: auto; background: var(--tg-bg); }
        .main-chat { flex-grow: 1; display: flex; flex-direction: column; background: #e7ebf0; }
        
        .dialog-item { padding: 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: 0.2s; }
        .dialog-item:hover { background: var(--tg-gray); }
        .dialog-item.active { background: #eff7ff; }

        .chat-header { padding: 10px 20px; background: white; border-bottom: 1px solid #ddd; display: flex; align-items: center; justify-content: space-between; }
        .messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .input-area { padding: 15px; background: white; display: flex; gap: 10px; }
        
        input, button { padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        button { background: var(--tg-blue); color: white; border: none; cursor: pointer; }
        
        /* Premium Elements */
        .premium-badge { background: var(--premium-gradient); color: white; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="auth-container">
    <h2>Telegram Login <span class="premium-star">★</span></h2>
    <div id="phone-step">
        <input type="text" id="phone" placeholder="+79001234567">
        <button onclick="sendCode()">Отправить код</button>
    </div>
    <div id="code-step" style="display:none;">
        <input type="text" id="code" placeholder="Код из Telegram">
        <button onclick="login()">Войти</button>
    </div>
</div>

<div id="app">
    <div class="sidebar" id="dialogs-list">
        </div>
    <div class="main-chat">
        <div class="chat-header">
            <div id="chat-title">Выберите чат</div>
            <div class="premium-badge">PREMIUM ACTIVE</div>
        </div>
        <div class="messages" id="messages-container"></div>
        <div class="input-area">
            <button id="call-btn">📞 Call</button>
            <input type="text" id="message-text" style="flex-grow:1" placeholder="Напишите сообщение...">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>
</div>

<script>
    let currentPhone = "";
    let currentHash = "";

    async function sendCode() {
        currentPhone = document.getElementById('phone').value;
        const res = await fetch('/api/send-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: currentPhone })
        });
        const data = await res.json();
        if(data.success) {
            currentHash = data.phoneCodeHash;
            document.getElementById('phone-step').style.display = 'none';
            document.getElementById('code-step').style.display = 'block';
        }
    }

    async function login() {
        const code = document.getElementById('code').value;
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: currentPhone, code, phoneCodeHash: currentHash })
        });
        const data = await res.json();
        if(data.success) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            loadDialogs();
        }
    }

    async function loadDialogs() {
        const res = await fetch('/api/dialogs');
        const dialogs = await res.json();
        const list = document.getElementById('dialogs-list');
        list.innerHTML = dialogs.map(d => `
            <div class="dialog-item" onclick="selectChat('${d.id}', '${d.title}')">
                <strong>${d.title}</strong> <span class="premium-star">★</span>
                <div style="font-size: 0.8em; color: gray;">${d.lastMessage}</div>
            </div>
        `).join('');
    }

    function selectChat(id, title) {
        document.getElementById('chat-title').innerText = title;
        // Здесь будет логика подгрузки сообщений
    }

    function sendMessage() {
        const text = document.getElementById('message-text').value;
        if(!text) return;
        // Логика отправки через API
        document.getElementById('message-text').value = '';
    }
</script>
</body>
</html>
